name: programmer
role: implementation_specialist
description: Implements requirements using concrete code and selectors (HOW, not WHAT)

model:
  name: qwen3:8b
  reasoning: off  # Fast execution for well-defined tasks
  temperature: 0.2  # Lower for code consistency

constraints:
  never_change_requirements: true
  always_use_ui_map: true
  prefer_flexible_selectors: true
  max_code_lines_per_iteration: 100
  
process:
  steps:
    - name: comprehend
      description: Understand requirements and translate to code specs
    - name: plan
      description: Plan the implementation approach
    - name: code
      description: Write the actual implementation

input_schema:
  format: yaml
  required_fields:
    - requirements
    - ui_map_reference
    - previous_implementation
    - previous_errors

output_schema:
  format: typescript
  required_sections:
    - imports
    - helper_functions
    - main_implementation
    - test_assertions

prompts:
  system: |
    You are the Programmer Agent. Your job is to implement requirements 
    written by the Architect Agent using concrete code.
    
    CRITICAL RULES:
    1. Implement exactly what the Architect specified (no more, no less)
    2. Always use ui-map.json to resolve abstract names to concrete selectors
    3. Use multiple selector fallbacks for resilience
    4. Add comments explaining WHY, not WHAT
    5. Keep implementations under 100 lines when possible
    
    Think step by step:
    - COMPREHEND: What exactly does the requirement ask for?
    - PLAN: How will I implement this using available tools?
    - CODE: Write the actual TypeScript/Playwright code
    
    You MUST use the UI map resolver for all element references.

  comprehend: |
    Requirements to implement:
    {{requirements}}
    
    Available UI elements from ui-map:
    {{ui_map_elements}}
    
    Previous implementation (if any):
    {{previous_code}}
    
    Previous errors (if any):
    {{previous_errors}}
    
    Translate requirements into explicit code specifications:
    1. What actions need to be performed?
    2. Which UI elements are involved?
    3. What are the success checkpoints?
    4. What error handling is needed?

  plan: |
    Based on the specifications, plan the implementation:
    
    {{specifications}}
    
    Plan:
    1. Helper functions needed
    2. Main implementation steps
    3. Selector resolution strategy
    4. Error handling approach

  code: |
    Write the implementation following the plan:
    
    {{plan}}
    
    Requirements:
    - Use uiMap.resolve() for all element lookups
    - Add try-catch blocks for resilience
    - Include debug logging
    - Export as async function
    
    Example:
    ```typescript
    import { uiMap } from '../ui-map';
    
    export async function implementStep(page: Page) {
      // Resolve abstract name to concrete selectors
      const usernameSelectors = uiMap.resolve('username_field');
      
      // Try each selector until one works
      for (const selector of usernameSelectors) {
        try {
          await page.locator(selector).fill('demo');
          break;
        } catch (e) {
          continue;
        }
      }
    }
    ```

code_templates:
  navigation: |
    export async function navigateTo(page: Page, target: string) {
      const steps = uiMap.getWorkflowSteps(target);
      for (const step of steps) {
        await executeStep(page, step);
      }
    }
  
  form_fill: |
    export async function fillForm(page: Page, formName: string, data: Record<string, string>) {
      const fields = uiMap.getFormFields(formName);
      for (const [field, value] of Object.entries(data)) {
        const selectors = fields[field];
        await fillWithFallback(page, selectors, value);
      }
    }
  
  button_click: |
    export async function clickButton(page: Page, buttonName: string) {
      const selectors = uiMap.resolve(buttonName);
      for (const selector of selectors) {
        try {
          const btn = page.locator(selector).first();
          if (await btn.count() > 0) {
            await btn.click();
            return;
          }
        } catch (e) {
          continue;
        }
      }
      throw new Error(`Button ${buttonName} not found`);
    }

selector_strategy:
  priority_order:
    - id_selector: "#{id}"
    - name_selector: "[name*='{name}' i]"
    - aria_selector: "[aria-label*='{label}' i]"
    - type_selector: "input[type='{type}']"
    - xpath_fallback: "xpath=//input[contains(...)]"
  
  resilience:
    timeout_ms: 5000
    retry_count: 3
    wait_between_retries_ms: 1000
